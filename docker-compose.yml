version: "3.8"

networks:
  cache_net:
    driver: bridge

volumes:
  shared_db:

services:
  # Redis instances - one per node + shared Pub/Sub instance
  redis_a:
    image: redis:7-alpine
    container_name: redis_a
    networks:
      - cache_net
    ports:
      - "6391:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis_b:
    image: redis:7-alpine
    container_name: redis_b
    networks:
      - cache_net
    ports:
      - "6392:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis_c:
    image: redis:7-alpine
    container_name: redis_c
    networks:
      - cache_net
    ports:
      - "6393:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Application nodes
  node_a:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: node_a
    networks:
      - cache_net
    ports:
      - "5001:5001"
    environment:
      - NODE_NAME=node_a
      - NODE_PORT=5001
      - REDIS_HOST=redis_a
      - REDIS_PORT=6379
      - DB_PATH=/data/cache.db
      - CACHE_TTL=10
      - IS_WRITER=true
      - RUN_CONTROLLER=true
      - PUBSUB_REDIS_HOST=redis_a
      - PUBSUB_REDIS_PORT=6379
      - HIGH_THRESHOLD=50
      - LOW_THRESHOLD=10
      - CONTROLLER_INTERVAL=3
      - WRITE_WINDOW=5
      - BATCH_INTERVAL=2.5
    volumes:
      - shared_db:/data
      - ./app:/srv/app
    depends_on:
      redis_a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  node_b:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: node_b
    networks:
      - cache_net
    ports:
      - "5002:5002"
    environment:
      - NODE_NAME=node_b
      - NODE_PORT=5002
      - REDIS_HOST=redis_b
      - REDIS_PORT=6379
      - DB_PATH=/data/cache.db
      - CACHE_TTL=10
      - IS_WRITER=false
      - RUN_CONTROLLER=false
      - PUBSUB_REDIS_HOST=redis_a
      - PUBSUB_REDIS_PORT=6379
    volumes:
      - shared_db:/data
      - ./app:/srv/app
    depends_on:
      redis_b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  node_c:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: node_c
    networks:
      - cache_net
    ports:
      - "5003:5003"
    environment:
      - NODE_NAME=node_c
      - NODE_PORT=5003
      - REDIS_HOST=redis_c
      - REDIS_PORT=6379
      - DB_PATH=/data/cache.db
      - CACHE_TTL=10
      - IS_WRITER=false
      - RUN_CONTROLLER=false
      - PUBSUB_REDIS_HOST=redis_a
      - PUBSUB_REDIS_PORT=6379
    volumes:
      - shared_db:/data
      - ./app:/srv/app
    depends_on:
      redis_c:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 5s
      timeout: 3s
      retries: 5
